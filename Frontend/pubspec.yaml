name: hsdmobil
description: Huawei Student Developer Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Yerel depolama (token saklama)
  shared_preferences: ^2.3.1

  # State yönetimi
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # WebSocket / STOMP

  # Tarih formatlama
  intl: ^0.19.0

  # İkonlar
  cupertino_icons: ^1.0.8
  stomp_dart_client: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
